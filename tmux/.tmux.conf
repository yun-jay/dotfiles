# ===== BASIC SETTINGS =====
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g base-index 0
set -g pane-base-index 0
set -g renumber-windows on
set -g allow-rename off
setw -g mode-keys vi

# ===== PREFIX KEY =====
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ===== FIX: Unbind Space in root table to avoid Neovim leader conflict =====
unbind -T root Space

# ===== PANE NAVIGATION =====
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ===== PANE RESIZING =====
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ===== WINDOW NAVIGATION =====
bind 0 select-window -t 0
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind -r n next-window
bind -r p previous-window

# ===== WINDOW/PANE CREATION =====
bind c new-window -c "#{pane_current_path}"
bind d split-window -h -c "#{pane_current_path}"
bind D split-window -v -c "#{pane_current_path}"

# ===== COPY MODE =====
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'
set -s set-clipboard on

# ===== STATUS BAR =====
set -g status-position bottom
set -g status-left-length 30
set -g status-left "[#S] "
set -g status-right "%H:%M %d-%b"
set -g status-style bg=black,fg=white
setw -g window-status-current-style bg=blue,fg=white,bold
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# ===== PANE BORDERS =====
set -g pane-border-status off

# ===== WORKTREE MANAGEMENT (wt CLI) =====
bind g run-shell "wt toggle >/dev/null 2>&1"
bind T display-popup -E -w 60% -h 50% -d "#{pane_current_path}" "wt switch || read -n 1"
bind B command-prompt -p "new branch:" "run-shell 'wt add %% --no-switch >/dev/null 2>&1'"

# Bookmark navigation
bind e display-popup -E -w 60% -h 50% -d "#{pane_current_path}" "wt marks || read -n 1"
bind N run-shell "wt next >/dev/null 2>&1"
bind P run-shell "wt prev >/dev/null 2>&1"

# ===== UTILITIES =====
bind R source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ===== PLUGINS =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh nvim vim'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
